defaults:
  - _self_
  - task: bbbp

seed: 42
device: cuda

model:
  name: DeepChem/ChemBERTa-100M-MLM
  tokenizer_name: null
  max_length: 256
  dropout: 0.1

training:
  epochs: 5
  batch_size: 32
  num_workers: 0
  grad_clip_norm: 1.0
  amp: true

optimizer:
  adamw:
    lr: 2.0e-5
    betas: [0.9, 0.999]
    eps: 1.0e-8
    weight_decay: 0.01
  muon:
    lr: 5.0e-5
    momentum: 0.95
    ns_steps: 5
    beta2: 0.99
    weight_decay: 0.01

logging:
  log_every_steps: 20
